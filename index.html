<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 강의 반응 수집 시스템 (최종 완성본)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen">

    <!-- 강사 네비게이션 바 -->
    <header id="teacher-header" class="hidden bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <span class="bg-amber-100 text-amber-800 text-xs font-bold px-2 py-1 rounded">강사 모드 (최종)</span>
                <span class="text-sm font-semibold text-slate-500">현재 세션: <span id="nav-session-num" class="text-indigo-600 font-bold">1</span>회차</span>
            </div>
            <div class="flex bg-slate-100 p-1 rounded-xl border border-slate-200">
                <button id="tab-qr" onclick="switchTeacherSubView('qr')" class="px-4 py-2 text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm">
                    <i class="fa-solid fa-qrcode mr-1.5"></i>QR 띄우기
                </button>
                <button id="tab-dash" onclick="switchTeacherSubView('dash')" class="px-4 py-2 text-sm font-bold rounded-lg text-slate-600 ml-1">
                    <i class="fa-solid fa-chart-bar mr-1.5"></i>결과 대시보드
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- 1. [강사] QR 화면 -->
        <section id="view-teacher-qr" class="hidden space-y-8 text-center py-6">
            <div class="max-w-2xl mx-auto bg-white border-2 border-indigo-100 p-8 rounded-3xl shadow-xl space-y-6">
                <div class="space-y-2">
                    <h2 class="text-3xl font-black text-slate-900 tracking-tight">스마트폰으로 QR 코드를 스캔하세요!</h2>
                    <p id="qr-session-guide" class="text-indigo-600 font-bold text-lg">현재 <span id="qr-session-text">1</span>회차 질문 접속용 QR입니다.</p>
                </div>
                <div class="bg-slate-50 p-6 border border-slate-100 rounded-2xl inline-block mx-auto shadow-inner">
                    <img id="mega-qr-code-img" src="" alt="접속 QR코드" class="w-64 h-64 mx-auto bg-white border-2 border-slate-200 p-2 rounded-xl shadow-sm">
                </div>
                <div class="space-y-2 max-w-md mx-auto">
                    <span class="text-xs font-bold text-slate-400 block uppercase">직접 입력 주소</span>
                    <div class="bg-slate-100 text-slate-700 font-mono text-sm p-3 rounded-xl border border-slate-200 break-all select-all font-semibold" id="mega-url-display"></div>
                </div>
                
                <!-- 직관적인 비밀번호 진입 버튼 -->
                <div class="pt-6 border-t border-slate-100">
                    <button onclick="promptTeacherPassword()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-4 rounded-xl transition-all shadow-lg flex items-center justify-center space-x-2 text-lg">
                        <i class="fa-solid fa-lock text-amber-400"></i>
                        <span>관리자 대시보드 진입 (결과 보기)</span>
                    </button>
                </div>
            </div>
        </section>

        <!-- 2. [강사] 대시보드 화면 -->
        <section id="view-teacher-dashboard" class="hidden space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <!-- 설정 -->
                <div class="bg-white border border-slate-200 p-6 rounded-2xl shadow-sm space-y-5 md:col-span-1">
                    <h3 class="text-md font-bold text-slate-900 border-b border-slate-100 pb-2.5 flex items-center">
                        <i class="fa-solid fa-sliders text-indigo-500 mr-2"></i>운영 설정
                    </h3>
                    
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-600">문항 수 조절</label>
                        <div class="flex items-center space-x-2">
                            <button onclick="adjustQuestionCount(-1)" class="w-10 h-10 bg-slate-100 border border-slate-200 rounded-lg flex items-center justify-center font-bold">-</button>
                            <input type="number" id="config-q-count" value="25" class="w-16 text-center font-bold border border-slate-300 py-2 rounded-lg bg-slate-50" readonly>
                            <button onclick="adjustQuestionCount(1)" class="w-10 h-10 bg-slate-100 border border-slate-200 rounded-lg flex items-center justify-center font-bold">+</button>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-600">진행 회차 (클릭 시 QR코드 자동 변경)</label>
                        <div class="grid grid-cols-2 gap-1.5">
                            <button id="btn-sess-1" onclick="changeSession(1)" class="py-2 text-xs font-bold border rounded-lg transition-all border-indigo-600 bg-indigo-50 text-indigo-700">1회차</button>
                            <button id="btn-sess-2" onclick="changeSession(2)" class="py-2 text-xs font-bold border rounded-lg transition-all border-slate-200 text-slate-600">2회차</button>
                        </div>
                    </div>
                </div>

                <!-- 정답 설정 -->
                <div class="bg-white border border-slate-200 p-6 rounded-2xl shadow-sm md:col-span-2 flex flex-col justify-between">
                    <div class="space-y-4">
                        <h3 class="text-md font-bold text-slate-900 border-b border-slate-100 pb-2.5">
                            <i class="fa-solid fa-key text-amber-500 mr-2"></i>실제 정답 데이터 기준 설정
                        </h3>
                        
                        <div class="bg-amber-50/60 border border-amber-200 p-3 rounded-xl flex items-center justify-between">
                            <label class="text-sm font-bold text-slate-800">실제 전체 평균 점수</label>
                            <input type="number" id="teacher-actual-avg" step="0.1" placeholder="85.0" class="w-32 px-3 py-1.5 border border-slate-300 rounded-lg font-bold text-amber-800 text-center">
                        </div>

                        <div class="overflow-y-auto max-h-48 border border-slate-200 rounded-xl bg-slate-50">
                            <table class="w-full text-left border-collapse text-xs text-center">
                                <thead class="bg-slate-200 sticky top-0 font-bold text-slate-600">
                                    <tr>
                                        <th class="p-2 w-1/2 border-b border-slate-300">문항</th>
                                        <th class="p-2 w-1/2 border-b border-slate-300">실제 정답률 (%)</th>
                                    </tr>
                                </thead>
                                <tbody id="teacher-questions-table-body" class="divide-y divide-slate-200 bg-white font-medium"></tbody>
                            </table>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button onclick="fetchAndRenderComparison()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center space-x-2 text-lg">
                            <i class="fa-solid fa-download"></i>
                            <span>구글 시트에서 데이터 불러와서 비교표 보기</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- [결과창] -->
            <div id="comparison-results-section" class="hidden bg-white border border-slate-200 p-6 rounded-2xl shadow-sm space-y-4">
                <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between border-b border-slate-100 pb-3 gap-2">
                    <h3 class="text-lg font-bold text-slate-900"><i class="fa-solid fa-table-list text-emerald-500 mr-2"></i>종합 정답률 비교 데이터 뷰</h3>
                    <div class="flex items-center space-x-3 bg-slate-50 border p-2 rounded-xl text-xs">
                        <div>
                            <span class="text-slate-400 block font-bold">실제 평균</span>
                            <span id="stat-actual-avg" class="font-black text-amber-600 text-sm">-</span>
                        </div>
                        <div class="border-l h-6"></div>
                        <div>
                            <span class="text-slate-400 block font-bold">제출 조 평균</span>
                            <span id="stat-groups-avg" class="font-black text-indigo-600 text-sm">-</span>
                        </div>
                    </div>
                </div>

                <!-- 비교 표 출력 영역 -->
                <div class="overflow-x-auto border border-slate-200 rounded-xl">
                    <table class="w-full text-xs text-left border-collapse text-center">
                        <thead class="bg-slate-100 font-bold border-b border-slate-200">
                            <tr id="table-header-row">
                                <th class="px-3 py-2.5 bg-slate-100 border-r sticky left-0">문항</th>
                                <th class="px-3 py-2.5 bg-amber-100 text-amber-900 border-r">실제 정답률</th>
                                <th class="px-3 py-2.5 bg-indigo-50 text-indigo-900 border-r">조별 평균</th>
                            </tr>
                        </thead>
                        <tbody id="table-body-rows" class="divide-y divide-slate-200 font-semibold bg-white"></tbody>
                    </table>
                </div>
            </div>
        </section>


        <!-- 3. [학생] 입력 화면 -->
        <section id="view-student" class="space-y-6">
            <div id="student-login-card" class="bg-white border border-slate-200 p-8 rounded-3xl shadow-sm max-w-md mx-auto">
                <div class="text-center mb-6">
                    <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-sm">
                        <i class="fa-solid fa-users text-3xl"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-900">조 이름 입력</h3>
                    <p id="student-login-session-text" class="text-sm font-bold text-indigo-600 mt-2 bg-indigo-50 inline-block px-3 py-1 rounded-full">현재 1회차 질문 접속됨</p>
                </div>
                <div class="space-y-4">
                    <input type="text" id="student-group-name" placeholder="예: 3조" class="w-full px-4 py-4 border-2 border-slate-200 rounded-xl focus:outline-none focus:border-indigo-500 text-xl font-bold text-center">
                    <button onclick="startGroupInput()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl shadow flex items-center justify-center space-x-2 text-lg">
                        <span>입력 시작하기</span>
                    </button>
                </div>
            </div>

            <div id="student-input-form" class="hidden bg-white border border-slate-200 p-6 rounded-3xl shadow-md space-y-6">
                <div class="flex items-center justify-between border-b border-slate-100 pb-3.5">
                    <div>
                        <span id="active-group-badge" class="bg-emerald-50 text-emerald-700 border border-emerald-200 text-xs font-black px-2.5 py-1 rounded-md uppercase">00조 입력 상태</span>
                        <h3 id="student-session-indicator" class="text-xl font-black text-slate-900 mt-2">정답률 입력 표 (1회차)</h3>
                    </div>
                    <button onclick="exitGroupInput()" class="text-rose-500 font-bold text-xs bg-rose-50 px-3 py-2 rounded-lg">
                        조 이름 변경
                    </button>
                </div>

                <div class="bg-indigo-50/60 border border-indigo-100 p-5 rounded-2xl space-y-2">
                    <label class="block text-lg font-extrabold text-slate-900">
                        <i class="fa-solid fa-calculator text-indigo-600 mr-1.5"></i>우리 조 예측 [전체 평균]
                    </label>
                    <div class="relative">
                        <input type="number" id="input-student-avg" step="0.1" placeholder="예: 85.5" class="w-full px-4 py-4 border-2 border-slate-300 rounded-xl focus:outline-none focus:border-indigo-500 font-black text-2xl text-indigo-700 text-center shadow-sm">
                        <span class="absolute inset-y-0 right-4 flex items-center font-bold text-slate-400">점</span>
                    </div>
                </div>

                <div class="space-y-3">
                    <h4 class="text-md font-bold text-slate-700">
                        <i class="fa-solid fa-list-check text-indigo-600 mr-1.5"></i>문항별 예측 정답률 입력 (%)
                    </h4>
                    <div class="overflow-hidden border border-slate-200 rounded-2xl shadow-inner bg-white">
                        <table class="w-full text-left border-collapse">
                            <thead class="bg-slate-100 border-b border-slate-200 text-slate-600 font-bold text-sm text-center">
                                <tr>
                                    <th class="px-4 py-3 w-1/3 border-r">문항 번호</th>
                                    <th class="px-4 py-3 w-2/3">예측 정답률 (%)</th>
                                </tr>
                            </thead>
                            <tbody id="student-questions-table-body" class="divide-y divide-slate-200 font-semibold text-center"></tbody>
                        </table>
                    </div>
                </div>

                <div class="pt-2">
                    <button onclick="submitStudentData()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold py-4 px-4 rounded-xl shadow-lg transition-all flex items-center justify-center space-x-2 text-xl">
                        <i class="fa-solid fa-cloud-arrow-up"></i>
                        <span>데이터 구글 시트로 제출하기</span>
                    </button>
                </div>
            </div>
        </section>

    </main>

    <script>
        // 선생님의 구글 스프레드시트 URL 고정 세팅 완료
        const GOOGLE_SHEET_URL = "https://script.google.com/macros/s/AKfycbw7q5Kc-bm8Fq-EpK3NqRt420qk6JR4qjRIu_C7GGwZ6rjBeh_GcIWZi3yiWDwTjD_QLg/exec";

        let appState = {
            isTeacherMode: false, teacherSubView: 'qr', session: 1, questionCount: 25,
            session1: { actualAvg: null, actualRates: {} },
            session2: { actualAvg: null, actualRates: {} }
        };

        let fetchedGroupsData = {}; 

        window.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('mode') === 'teacher') appState.isTeacherMode = true;

            // [핵심 변경사항] URL 파라미터에서 session 번호를 감지하여 학생 화면의 세션을 자동으로 맞춰줍니다.
            const sessionParam = urlParams.get('session');
            if (sessionParam) {
                appState.session = parseInt(sessionParam);
                document.getElementById('student-login-session-text').innerText = `현재 ${appState.session}회차 질문 접속됨`;
            }

            updateQRCodeDisplay();
            initRoleRoutingView();
        });

        // [핵심 변경사항] 세션이 바뀔 때마다 QR 코드의 연결 주소를 다르게(1회차, 2회차) 생성합니다.
        function updateQRCodeDisplay() {
            const cleanUrl = window.location.origin + window.location.pathname + "?session=" + appState.session;
            document.getElementById('mega-url-display').innerText = cleanUrl;
            document.getElementById('mega-qr-code-img').src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(cleanUrl)}`;
            document.getElementById('qr-session-text').innerText = appState.session;
        }

        function initRoleRoutingView() {
            if (appState.isTeacherMode) {
                document.getElementById('teacher-header').classList.remove('hidden');
                document.getElementById('view-student').classList.add('hidden');
                switchTeacherSubView('qr');
            } else {
                document.getElementById('teacher-header').classList.add('hidden');
                document.getElementById('view-teacher-qr').classList.add('hidden');
                document.getElementById('view-teacher-dashboard').classList.add('hidden');
                document.getElementById('view-student').classList.remove('hidden');
            }
        }

        function switchTeacherSubView(subView) {
            appState.teacherSubView = subView;
            if (subView === 'qr') {
                document.getElementById('tab-qr').className = "px-4 py-2 text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm";
                document.getElementById('tab-dash').className = "px-4 py-2 text-sm font-bold rounded-lg text-slate-600 ml-1";
                document.getElementById('view-teacher-qr').classList.remove('hidden');
                document.getElementById('view-teacher-dashboard').classList.add('hidden');
            } else {
                document.getElementById('tab-dash').className = "px-4 py-2 text-sm font-bold rounded-lg bg-white text-indigo-600 shadow-sm";
                document.getElementById('tab-qr').className = "px-4 py-2 text-sm font-bold rounded-lg text-slate-600 ml-1";
                document.getElementById('view-teacher-dashboard').classList.remove('hidden');
                document.getElementById('view-teacher-qr').classList.add('hidden');
                loadTeacherDashboardDataInputs();
            }
        }

        function promptTeacherPassword() {
            const pw = prompt("대시보드 관리자 비밀번호를 입력해 주세요.\n(기본 비밀번호: 1234)");
            if (pw === "1234") {
                switchTeacherSubView('dash');
            } else if (pw !== null) {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        function adjustQuestionCount(delta) {
            let currentVal = appState.questionCount + delta;
            if (currentVal < 1) currentVal = 1;
            if (currentVal > 100) currentVal = 100;
            appState.questionCount = currentVal;
            document.getElementById('config-q-count').value = currentVal;
            refreshDynamicTableForms();
        }

        function refreshDynamicTableForms() {
            const sTbody = document.getElementById('student-questions-table-body');
            const tTbody = document.getElementById('teacher-questions-table-body');
            sTbody.innerHTML = ''; tTbody.innerHTML = '';
            const sessionKey = 'session' + appState.session;

            for (let i = 1; i <= appState.questionCount; i++) {
                const sTr = document.createElement('tr');
                sTr.innerHTML = `
                    <td class="px-4 py-4 font-black text-slate-600 text-lg bg-slate-50/50 border-r border-slate-200">${i}번</td>
                    <td class="px-6 py-2 flex justify-center">
                        <div class="relative w-full max-w-xs">
                            <input type="number" id="s-q-${i}" min="0" max="100" placeholder="입력" class="w-full text-center py-4 px-4 border-2 border-slate-300 rounded-xl focus:border-indigo-500 font-black text-2xl">
                            <span class="absolute inset-y-0 right-4 flex items-center font-black text-slate-400">%</span>
                        </div>
                    </td>
                `;
                sTbody.appendChild(sTr);

                const tVal = appState[sessionKey].actualRates[i] ?? '';
                const tTr = document.createElement('tr');
                tTr.innerHTML = `
                    <td class="p-2 border-r font-bold text-amber-800 bg-amber-50/20">${i}번</td>
                    <td class="p-1.5 flex justify-center">
                        <div class="relative w-full max-w-xxs">
                            <input type="number" id="t-q-${i}" min="0" max="100" value="${tVal}" onchange="updateTeacherRateElement(${i}, this.value)" class="w-full text-center py-1.5 border border-slate-300 rounded-lg text-sm font-bold">
                        </div>
                    </td>
                `;
                tTbody.appendChild(tTr);
            }
        }

        function loadTeacherDashboardDataInputs() {
            const sessionKey = 'session' + appState.session;
            document.getElementById('teacher-actual-avg').value = appState[sessionKey].actualAvg ?? '';
            document.getElementById('nav-session-num').innerText = appState.session;
            refreshDynamicTableForms();
        }

        function updateTeacherRateElement(qNum, value) {
            const sessionKey = 'session' + appState.session;
            appState[sessionKey].actualRates[qNum] = value !== '' ? parseFloat(value) : null;
        }

        document.getElementById('teacher-actual-avg').addEventListener('input', (e) => {
            appState['session' + appState.session].actualAvg = e.target.value !== '' ? parseFloat(e.target.value) : null;
        });

        // [핵심 변경사항] 대시보드에서 세션을 바꾸면, QR 코드도 그 회차에 맞게 자동으로 다시 그려집니다.
        function changeSession(sNum) {
            appState.session = sNum;
            document.getElementById('btn-sess-1').className = sNum === 1 ? "py-2 text-xs font-bold border rounded-lg border-indigo-600 bg-indigo-50 text-indigo-700" : "py-2 text-xs font-bold border rounded-lg border-slate-200 text-slate-600";
            document.getElementById('btn-sess-2').className = sNum === 2 ? "py-2 text-xs font-bold border rounded-lg border-indigo-600 bg-indigo-50 text-indigo-700" : "py-2 text-xs font-bold border rounded-lg border-slate-200 text-slate-600";
            
            updateQRCodeDisplay(); // 회차 변경 시 QR 코드 즉각 갱신
            loadTeacherDashboardDataInputs();
            document.getElementById('comparison-results-section').classList.add('hidden');
        }

        function startGroupInput() {
            const groupName = document.getElementById('student-group-name').value.trim();
            if (!groupName) { alert('조 이름을 입력해 주세요!'); return; }
            document.getElementById('active-group-badge').innerText = `${groupName} 입력 중`;
            document.getElementById('student-session-indicator').innerText = `정답률 표 (${appState.session}회차)`;
            document.getElementById('student-login-card').classList.add('hidden');
            document.getElementById('student-input-form').classList.remove('hidden');
            refreshDynamicTableForms();
        }

        function exitGroupInput() {
            document.getElementById('student-login-card').classList.remove('hidden');
            document.getElementById('student-input-form').classList.add('hidden');
        }

        function submitStudentData() {
            const groupName = document.getElementById('active-group-badge').innerText.replace(' 입력 중', '');
            const avgInput = document.getElementById('input-student-avg').value;
            
            if (!avgInput) { alert('전체 평균 점수를 입력해 주세요.'); return; }

            const ratesData = {};
            for (let i = 1; i <= appState.questionCount; i++) {
                const qIn = document.getElementById(`s-q-${i}`);
                ratesData[i] = qIn && qIn.value !== '' ? parseFloat(qIn.value) : 0;
            }

            const payload = {
                session: appState.session,
                groupName: groupName,
                avgScore: parseFloat(avgInput),
                rates: ratesData
            };

            fetch(GOOGLE_SHEET_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                if(data.status === "success") {
                    alert(`✅ 제출 완료! ${groupName} 데이터가 ${appState.session}회차로 시트에 기록되었습니다.`);
                } else {
                    alert("⚠️ 제출 오류: " + data.message);
                }
            })
            .catch(error => {
                alert("서버 연결에 실패했습니다.");
            });
        }

        function fetchAndRenderComparison() {
            fetch(`${GOOGLE_SHEET_URL}?session=${appState.session}`)
            .then(res => res.json())
            .then(data => {
                if(data.status === "success") {
                    fetchedGroupsData = data.groups;
                    renderComparisonTable();
                } else {
                    alert("데이터 불러오기 실패");
                }
            })
            .catch(e => alert("데이터를 가져오지 못했습니다."));
        }

        function renderComparisonTable() {
            const sessionKey = 'session' + appState.session;
            const currentSessionData = appState[sessionKey];
            const groupList = Object.keys(fetchedGroupsData).sort();
            
            if (groupList.length === 0) {
                alert(`현재 시트에 저장된 ${appState.session}회차 학생 데이터가 없습니다.`);
                return;
            }

            const rSection = document.getElementById('comparison-results-section');
            rSection.classList.remove('hidden');

            document.getElementById('stat-actual-avg').innerText = currentSessionData.actualAvg !== null ? currentSessionData.actualAvg + '점' : '미입력';
            
            let sumAvgScore = 0;
            groupList.forEach(g => sumAvgScore += fetchedGroupsData[g].avgScore || 0);
            document.getElementById('stat-groups-avg').innerText = (sumAvgScore / groupList.length).toFixed(1) + '점';

            const hRow = document.getElementById('table-header-row');
            hRow.innerHTML = `
                <th class="px-2 py-3 sticky left-0 bg-slate-100 border-r w-16 text-center">문항</th>
                <th class="px-2 py-3 bg-amber-100 text-amber-900 border-r w-24 text-center">실제 (%)</th>
                <th class="px-2 py-3 bg-indigo-50 text-indigo-900 border-r w-24 text-center">조별 평균 (%)</th>
            `;
            groupList.forEach(gName => {
                hRow.innerHTML += `<th class="px-2 py-3 border-r bg-slate-50 text-slate-700 text-xs font-bold">${gName}</th>`;
            });

            const tbody = document.getElementById('table-body-rows');
            tbody.innerHTML = '';

            for (let i = 1; i <= appState.questionCount; i++) {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 border-b";

                const actualRate = currentSessionData.actualRates[i] ?? null;
                let qSum = 0, qCount = 0;
                groupList.forEach(g => {
                    const r = fetchedGroupsData[g].rates[i];
                    if (r !== undefined && r !== null) { qSum += r; qCount++; }
                });
                const qGroupAvg = qCount > 0 ? (qSum / qCount).toFixed(1) : null;

                let rowHClass = '', alertIcon = '';
                if (actualRate !== null && qGroupAvg !== null && Math.abs(actualRate - parseFloat(qGroupAvg)) >= 15) {
                    rowHClass = 'bg-rose-50 text-rose-900 font-extrabold';
                    alertIcon = '<span class="text-rose-500 block text-[10px] mt-1"><i class="fa-solid fa-triangle-exclamation"></i> 오차 15%+</span>';
                }

                let rowHtml = `
                    <td class="px-2 py-3 sticky left-0 bg-slate-100/90 border-r font-bold ${rowHClass}">${i}번 ${alertIcon}</td>
                    <td class="px-2 py-3 border-r text-amber-800 bg-amber-50/30 font-black text-sm">${actualRate !== null ? actualRate + '%' : '-'}</td>
                    <td class="px-2 py-3 border-r text-indigo-600 bg-indigo-50/30 font-black text-sm">${qGroupAvg !== null ? qGroupAvg + '%' : '-'}</td>
                `;

                groupList.forEach(g => {
                    const groupRate = fetchedGroupsData[g].rates[i];
                    let cellStyle = 'text-slate-600 font-medium';
                    if (actualRate !== null && groupRate !== undefined && groupRate !== null && Math.abs(actualRate - groupRate) >= 15) {
                        cellStyle = 'bg-rose-100/60 text-rose-800 font-black';
                    }
                    rowHtml += `<td class="px-2 py-3 border-r ${cellStyle}">${groupRate !== undefined && groupRate !== null ? groupRate + '%' : '-'}</td>`;
                });

                tr.innerHTML = rowHtml;
                tbody.appendChild(tr);
            }
            rSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    </script>
</body>
</html>
